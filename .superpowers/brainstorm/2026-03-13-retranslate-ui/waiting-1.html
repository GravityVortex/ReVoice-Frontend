<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continuing in terminal</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, rgba(251,113,133,0.12), transparent 28%), #0f172a;
      color: rgba(255,255,255,0.78);
      font-family: "SF Pro Display", "PingFang SC", sans-serif;
    }
    .card {
      padding: 22px 28px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(15,23,42,0.72);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      text-align: center;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.62);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">继续在终端里确认设计细节</div>
    <div class="sub">下一步会收敛状态、提示和动作文案。</div>
  </div>
</body>
</html>
